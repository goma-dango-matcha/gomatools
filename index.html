<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>年齢・日付計算｜ゴマツール</title>
  <style>
    :root {
      --main: #4f8f5b;
      --main-dark: #3f794b;
      --bg: #f7faf7;
      --card: #ffffff;
      --text: #222;
      --muted: #666;
      --line: #e5e5e5;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    header {
      background: var(--card);
      border-bottom: 1px solid var(--line);
      padding: 18px 16px;
      text-align: center;
    }

    .brand {
      color: var(--main);
      font-weight: 800;
      font-size: 15px;
    }

    main {
      max-width: 760px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }

    .card {
      background: var(--card);
      border-radius: 18px;
      padding: 22px;
      margin-bottom: 18px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.06);
    }

    h1, h2 {
      margin-top: 0;
      text-align: center;
    }

    h1 {
      font-size: 26px;
      margin-bottom: 10px;
    }

    h2 {
      font-size: 20px;
      margin-bottom: 14px;
    }

    p {
      color: var(--muted);
      line-height: 1.7;
    }

    label {
      display: block;
      font-weight: 700;
      margin: 14px 0 8px;
    }

    input, select {
      width: 100%;
      box-sizing: border-box;
      font-size: 17px;
      padding: 13px;
      border: 1px solid #ccc;
      border-radius: 12px;
      background: white;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 16px;
      border: none;
      border-radius: 12px;
      background: var(--main);
      color: white;
      font-size: 17px;
      font-weight: 800;
      cursor: pointer;
    }

    button:hover {
      background: var(--main-dark);
    }

    .result {
      display: none;
      margin-top: 18px;
    }

    .result-item {
      background: #f2f7f2;
      border-radius: 14px;
      padding: 15px;
      margin-top: 12px;
    }

    .result-title {
      color: var(--main);
      font-weight: 800;
      font-size: 14px;
    }

    .result-value {
      font-size: 22px;
      font-weight: 900;
      margin-top: 5px;
      line-height: 1.4;
    }

    .small {
      font-size: 13px;
      color: var(--muted);
      margin-top: 8px;
    }

    footer {
      text-align: center;
      color: #777;
      font-size: 13px;
      padding: 28px 12px;
    }
  </style>
</head>
<body>

<header>
  <div class="brand">🍵 ゴマツール</div>
</header>

<main>
  <section class="card">
    <h1>🎂 年齢・日付計算</h1>
    <p>
      生年月日から、年齢・生まれてからの日数・次の誕生日までの日数・生まれた曜日を計算できます。
    </p>
    <p class="small" id="todayText"></p>

    <label for="birthday">生年月日</label>
    <input type="date" id="birthday">

    <button onclick="calculateAge()">年齢を計算する</button>

    <div class="result" id="ageResultBox">
      <div class="result-item">
        <div class="result-title">現在の年齢</div>
        <div class="result-value" id="ageResult"></div>
      </div>

      <div class="result-item">
        <div class="result-title">詳しい年齢</div>
        <div class="result-value" id="detailAgeResult"></div>
      </div>

      <div class="result-item">
        <div class="result-title">生まれてからの日数</div>
        <div class="result-value" id="daysAliveResult"></div>
      </div>

      <div class="result-item">
        <div class="result-title">次の誕生日まで</div>
        <div class="result-value" id="nextBirthdayResult"></div>
      </div>

      <div class="result-item">
        <div class="result-title">生まれた曜日</div>
        <div class="result-value" id="weekdayResult"></div>
      </div>

      <button onclick="copyAgeResult()">結果をコピーする</button>
    </div>
  </section>

  <section class="card">
    <h2>📅 日付計算</h2>
    <p>
      指定した日付から、何日後・何日前の日付を計算できます。
    </p>

    <label for="baseDate">基準日</label>
    <input type="date" id="baseDate">

    <label for="daysNumber">日数</label>
    <input type="number" id="daysNumber" placeholder="例：100">

    <label for="direction">計算方向</label>
    <select id="direction">
      <option value="after">日後</option>
      <option value="before">日前</option>
    </select>

    <button onclick="calculateDate()">日付を計算する</button>

    <div class="result" id="dateResultBox">
      <div class="result-item">
        <div class="result-title">計算結果</div>
        <div class="result-value" id="dateResult"></div>
      </div>
    </div>
  </section>
</main>

<footer>
  Project Goma｜小さく作って、早く公開して、一歩ずつ育てる。
</footer>

<script>
  const weekdays = ["日曜日", "月曜日", "火曜日", "水曜日", "木曜日", "金曜日", "土曜日"];

  function formatDate(date) {
    return `${date.getFullYear()}年${date.getMonth() + 1}月${date.getDate()}日（${weekdays[date.getDay()]}）`;
  }

  function setTodayText() {
    const today = new Date();
    document.getElementById("todayText").textContent = `※ ${formatDate(today)} 時点で計算します。`;
    document.getElementById("baseDate").valueAsDate = today;
  }

  function calculateAge() {
    const input = document.getElementById("birthday").value;

    if (!input) {
      alert("生年月日を入力してください。");
      return;
    }

    const birthDate = new Date(input);
    const today = new Date();

    if (birthDate > today) {
      alert("未来の日付は入力できません。");
      return;
    }

    let years = today.getFullYear() - birthDate.getFullYear();
    let months = today.getMonth() - birthDate.getMonth();
    let days = today.getDate() - birthDate.getDate();

    if (days < 0) {
      months--;
      const previousMonth = new Date(today.getFullYear(), today.getMonth(), 0);
      days += previousMonth.getDate();
    }

    if (months < 0) {
      years--;
      months += 12;
    }

    const oneDay = 1000 * 60 * 60 * 24;
    const daysAlive = Math.floor((today - birthDate) / oneDay);

    let nextBirthday = new Date(today.getFullYear(), birthDate.getMonth(), birthDate.getDate());
    if (nextBirthday < today) {
      nextBirthday.setFullYear(today.getFullYear() + 1);
    }

    const daysUntilBirthday = Math.ceil((nextBirthday - today) / oneDay);
    const weekday = weekdays[birthDate.getDay()];

    document.getElementById("ageResult").textContent = `${years}歳`;
    document.getElementById("detailAgeResult").textContent = `${years}歳 ${months}か月 ${days}日`;
    document.getElementById("daysAliveResult").textContent = `${daysAlive.toLocaleString()}日`;
    document.getElementById("nextBirthdayResult").textContent = `あと${daysUntilBirthday}日｜${formatDate(nextBirthday)}`;
    document.getElementById("weekdayResult").textContent = weekday;

    document.getElementById("ageResultBox").style.display = "block";
  }

  function calculateDate() {
    const baseDateInput = document.getElementById("baseDate").value;
    const daysNumber = Number(document.getElementById("daysNumber").value);
    const direction = document.getElementById("direction").value;

    if (!baseDateInput) {
      alert("基準日を入力してください。");
      return;
    }

    if (!daysNumber && daysNumber !== 0) {
      alert("日数を入力してください。");
      return;
    }

    const resultDate = new Date(baseDateInput);

    if (direction === "after") {
      resultDate.setDate(resultDate.getDate() + daysNumber);
    } else {
      resultDate.setDate(resultDate.getDate() - daysNumber);
    }

    document.getElementById("dateResult").textContent = formatDate(resultDate);
    document.getElementById("dateResultBox").style.display = "block";
  }

  function copyAgeResult() {
    const age = document.getElementById("ageResult").textContent;
    const detailAge = document.getElementById("detailAgeResult").textContent;
    const daysAlive = document.getElementById("daysAliveResult").textContent;
    const nextBirthday = document.getElementById("nextBirthdayResult").textContent;
    const weekday = document.getElementById("weekdayResult").textContent;

    const text =
`【ゴマツール 年齢計算結果】
現在の年齢：${age}
詳しい年齢：${detailAge}
生まれてからの日数：${daysAlive}
次の誕生日まで：${nextBirthday}
生まれた曜日：${weekday}`;

    navigator.clipboard.writeText(text)
      .then(() => alert("結果をコピーしました。"))
      .catch(() => alert("コピーに失敗しました。"));
  }

  setTodayText();
</script>

</body>
</html>
